                function renderComponent(component) {
                    var heading = document.getElementById("page-heading");
                    var content = document.getElementById("component-content");
                    var tag = slugToTag(component.slug);
                    var desc =
                        component.description.charAt(0).toUpperCase() +
                        component.description.slice(1);

                    document.title = component.name + " — Lily Design System";
                    heading.textContent = component.name;

                    var demoHtml = componentDemos[component.slug] || '';

                    content.innerHTML =
                        '<p><a href="index.html">Back to all components</a></p>' +
                        '<div class="card" role="region" aria-label="Live demo">' +
                        '<h2>Demo</h2>' +
                        '<div style="padding: 1.5rem;">' +
                        demoHtml +
                        '</div>' +
                        '</div>' +
                        '<div class="card" role="region" aria-label="Component overview">' +
                        "<h2>Overview</h2>" +
                        '<table class="data-table" aria-label="Component details">' +
                        "<tbody>" +
                        '<tr><th scope="row">Name</th><td>' +
                        escapeHtml(component.name) +
                        "</td></tr>" +
                        '<tr><th scope="row">Slug</th><td><code>' +
                        escapeHtml(component.slug) +
                        "</code></td></tr>" +
                        '<tr><th scope="row">Description</th><td>' +
                        escapeHtml(desc) +
                        ".</td></tr>" +
                        '<tr><th scope="row">HTML Tag</th><td><code>&lt;' +
                        escapeHtml(tag) +
                        "&gt;</code></td></tr>" +
                        "</tbody>" +
                        "</table>" +
                        "</div>" +
                        '<div class="card" role="region" aria-label="Usage example">' +
                        "<h2>Usage</h2>" +
                        "<pre><code>&lt;" +
                        escapeHtml(tag) +
                        "&gt;\n  &lt;!-- content --&gt;\n&lt;/" +
                        escapeHtml(tag) +
                        "&gt;</code></pre>" +
                        "</div>" +
                        '<div class="card" role="region" aria-label="Import example">' +
                        "<h2>Import</h2>" +
                        '<pre><code>&lt;script src="components/' +
                        escapeHtml(component.slug) +
                        "/" +
                        escapeHtml(component.slug) +
                        '.js"&gt;&lt;/script&gt;</code></pre>' +
                        "</div>" +
                        '<p><a href="index.html">Back to all components</a></p>';
                }

                function renderNotFound(slug) {
                    var heading = document.getElementById("page-heading");
                    var content = document.getElementById("component-content");

                    document.title = "Component Not Found — Lily Design System";
                    heading.textContent = "Component Not Found";

                    content.innerHTML =
                        '<div class="banner" role="alert" aria-label="Error">' +
                        "<p>No component found with slug <code>" +
                        escapeHtml(slug || "") +
                        "</code>.</p>" +
                        "</div>" +
                        '<p><a href="index.html">Back to all components</a></p>';
                }

                var params = new URLSearchParams(window.location.search);
                var slug = params.get("slug");

                if (!slug) {
                    renderNotFound("");
                    return;
                }

                var found = null;
                for (var i = 0; i < components.length; i++) {
                    if (components[i].slug === slug) {
                        found = components[i];
                        break;
                    }
                }

                if (found) {
                    renderComponent(found);
                } else {
                    renderNotFound(slug);
                }
            })();
        </script>
