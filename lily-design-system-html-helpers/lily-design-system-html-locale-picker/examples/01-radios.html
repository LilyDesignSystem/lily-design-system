<!doctype html>
<!--
    Example 1 — Default radio-group rendering.

    The minimum viable picker: a label and a CSV list of locales.
    The picker resolves "en" as the initial locale (since "en" is
    in the list), writes <html lang="en"> and <html dir="ltr">,
    and dispatches a localechange CustomEvent.

    Consumers may need to compile locale-picker.ts to .js before
    loading. The path "../../locale-picker.js" is illustrative;
    adjust the <script src=…> to point at your build output.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>locale-picker — radios (default)</title>
    <script type="module" src="../../locale-picker.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; }
        .locale-picker { border: 1px solid #d8dde0; padding: 1rem; }
        .locale-picker-option { display: block; margin-block-end: 0.5rem; }
    </style>
</head>
<body>
    <h1>Locale picker — default radios</h1>

    <locale-picker
        label="Language"
        locales="en,fr,de,es"
    ></locale-picker>

    <p>Current document language: <code id="current">en</code></p>

    <script type="module">
        await customElements.whenDefined("locale-picker");
        document.querySelector("locale-picker")
            .addEventListener("localechange", (e) => {
                document.querySelector("#current").textContent = e.detail.locale;
            });
    </script>
</body>
</html>
