<!doctype html>
<!--
    Example 2 — Native <select> rendering via subclassing.

    The default rendering is a <fieldset> of radios. For long locale
    lists (10+) a native <select> is more compact and pops the
    OS-native picker on mobile.

    The HTML helpers don't have Svelte snippets or Vue slots, so
    custom rendering happens by extending the LocalePicker class
    and overriding connectedCallback / attributeChangedCallback.
    The base class still owns the lifecycle: lang / dir writes,
    localStorage persistence, localechange dispatch.

    Note: consumers may need to compile locale-picker.ts to .js
    before loading. The path "../../locale-picker.js" is
    illustrative; adjust to your build output.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>locale-picker — select</title>
    <script type="module" src="../../locale-picker.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; }
        .locale-picker { border: 0; padding: 0; }
        .locale-picker-select {
            font: inherit;
            padding: 0.5rem 0.75rem;
            border: 1px solid #4c6272;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Locale picker — native &lt;select&gt;</h1>

    <select-locale-picker
        label="Language"
        locales="en,en-US,en-GB,fr,fr-CA,de,de-AT,de-CH,es,es-MX,it,nl,pl,pt,pt-BR,ja,zh-Hans,zh-Hant,ko,ar,he"
        storage-key="select-demo-locale"
    ></select-locale-picker>

    <p>Selected: <code id="out">—</code></p>

    <script type="module">
        import { LocalePicker, defaultLocaleLabels } from "../../locale-picker.js";

        class SelectLocalePicker extends LocalePicker {
            connectedCallback() {
                super.connectedCallback();
                this._rerender();
            }
            attributeChangedCallback(name, oldVal, newVal) {
                super.attributeChangedCallback(name, oldVal, newVal);
                if (name === "value" || name === "locales" || name === "locale-labels") {
                    this._rerender();
                }
            }
            _rerender() {
                const fieldset = this.querySelector("fieldset");
                if (!fieldset) return;
                fieldset.innerHTML = "";

                const select = document.createElement("select");
                select.className = "locale-picker-select";
                select.setAttribute("aria-label", this.label);

                const labels = this.localeLabels;
                for (const locale of this.locales) {
                    const opt = document.createElement("option");
                    opt.value = locale;
                    opt.setAttribute("lang", locale.replace(/_/g, "-"));
                    opt.textContent =
                        labels[locale] ?? defaultLocaleLabels[locale] ?? locale;
                    if (locale === this.value) opt.selected = true;
                    select.appendChild(opt);
                }

                select.addEventListener("change", (e) => {
                    this.value = e.target.value;
                });
                fieldset.appendChild(select);
            }
        }
        customElements.define("select-locale-picker", SelectLocalePicker);

        await customElements.whenDefined("select-locale-picker");
        document
            .querySelector("select-locale-picker")
            .addEventListener("localechange", (e) => {
                document.querySelector("#out").textContent = e.detail.locale;
            });
    </script>
</body>
</html>
