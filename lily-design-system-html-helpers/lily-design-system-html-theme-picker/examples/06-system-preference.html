<!doctype html>
<!--
    Example 6 — Follow the OS `prefers-color-scheme`.

    The picker has no opinion about light vs. dark; it just owns the
    selection contract. To make the first-visit default follow the
    OS, resolve the media query yourself and pass the resolved slug
    as `default-value`. The user can still pick anything they like
    afterwards, and the choice persists via `storage-key`.

    The inline `<script>` runs before the picker mounts so the
    attribute is in place by the time connectedCallback fires.

    To also TRACK the OS preference over time (re-apply when the
    user toggles their system setting), see the second script block.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>theme-picker — system preference</title>
    <script type="module" src="/dist/theme-picker.js"></script>
</head>
<body>
    <h1>Theme picker — system preference</h1>

    <theme-picker
        label="Theme"
        themes-url="/assets/themes/"
        themes="light,dark"
        storage-key="my-app:theme"
    ></theme-picker>

    <script>
        // Runs before the module script (no `type="module"`), so
        // the attribute is set before the custom element upgrades.
        const prefersDark =
            window.matchMedia?.("(prefers-color-scheme: dark)").matches;
        const picker = document.querySelector("theme-picker");
        picker.setAttribute("default-value", prefersDark ? "dark" : "light");
    </script>

    <script type="module">
        // Track OS preference changes live (optional).
        await customElements.whenDefined("theme-picker");
        const picker = document.querySelector("theme-picker");
        window.matchMedia("(prefers-color-scheme: dark)")
            .addEventListener("change", (e) => {
                picker.value = e.matches ? "dark" : "light";
            });
    </script>
</body>
</html>
