<!doctype html>
<!--
    Example 3 — Multiple pickers in one page.

    Each picker gets a distinct `name`. The `name` plays two roles:
      1. It is the radio-input `name`, so the two groups don't share
         state.
      2. It is the discriminator on the managed <link> element, so
         each picker swaps its own stylesheet without stepping on
         the other.

    This is useful for: a "global" theme + a per-section accent
    theme; preview-vs-live theme A/B; or a settings page that
    compares two themes side-by-side.

    Note: the active `data-theme` attribute on <html> is set by
    whichever picker fires last. If you want two independent
    regions, also set `el.target` per picker so each updates a
    different DOM subtree.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>theme-picker — multiple</title>
    <script type="module" src="/dist/theme-picker.js"></script>
</head>
<body>
    <h1>Multiple pickers</h1>

    <section id="region-a" data-region="a">
        <h2>Region A</h2>
        <theme-picker
            label="Region A theme"
            name="region-a"
            themes-url="/assets/themes/"
            themes="light,dark"
        ></theme-picker>
    </section>

    <section id="region-b" data-region="b">
        <h2>Region B</h2>
        <theme-picker
            label="Region B theme"
            name="region-b"
            themes-url="/assets/themes/"
            themes="abyss,cupcake,dracula"
        ></theme-picker>
    </section>

    <script type="module">
        await customElements.whenDefined("theme-picker");
        const a = document.querySelector("#region-a");
        const b = document.querySelector("#region-b");
        a.querySelector("theme-picker").target = a;
        b.querySelector("theme-picker").target = b;
    </script>
</body>
</html>
