<!doctype html>
<!--
    Example 1 — Basic usage.

    The minimum viable select: a label, a themes directory, and a slug
    list. The select resolves "light" as the initial active theme
    (since "light" is in the list), sets data-theme="light" on <html>,
    and injects a <link rel="stylesheet"> pointing at
    /assets/themes/light.css.

    The control is an icon button that opens a dropdown listbox
    (WAI-ARIA APG listbox pattern), not a native <select>.

    The host element has no children until connectedCallback runs;
    the page may briefly look unstyled before the JS bundle loads.

    THE POSITIONING CSS IS NOT OPTIONAL. The package ships no CSS at
    all, so the <ul class="theme-select-list"> renders in normal flow
    and pushes the page down when it opens. The <style> block below is
    the minimum that makes it behave like a dropdown. Note the
    [hidden] rule: any `display` value on the list would override the
    user-agent `[hidden] { display: none }` and leave the closed list
    permanently visible. See docs/styling.md.

    THE STATUS LINE IS PART OF THE PATTERN — copy it along with the
    control. The closed button shows only a glyph, never the active
    theme name, so without this line there is nowhere the current
    selection is announced or displayed. See docs/accessibility.md.

    Three things to note about it:

    1. It is VISIBLE by default, not sr-only. Sighted users get the
       same "which theme am I on?" answer that screen-reader users do,
       which is what WCAG 2.2 AAA favours. For designs that genuinely
       cannot spare the space, swap the <p> for a visually-hidden
       variant (position: absolute; width: 1px; height: 1px;
       overflow: hidden; clip-path: inset(50%)) — keep the element in
       the accessibility tree; never use display: none or hidden.

    2. aria-live="polite" announces MUTATIONS only, so the region is
       silent on first paint and speaks once per change. That is the
       behaviour we want: no announcement on page load, a polite
       confirmation on every switch.

    3. The initial text is authored in the markup rather than written
       by JS on startup, which keeps first paint mutation-free (and so
       silent). It matches the resolved initial theme — "light", since
       this example sets no storage-key or default-value.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>theme-select — basic</title>
    <script type="module" src="/dist/theme-select.js"></script>
    <style>
        /* The root is the positioning context for the dropdown. */
        .theme-select {
            position: relative;
            display: inline-block;
        }

        .theme-select-button {
            display: inline-flex;
            align-items: center;
            padding: 0.35rem 0.5rem;
            border: 1px solid currentColor;
            border-radius: 0.25rem;
            background: transparent;
            color: inherit;
            cursor: pointer;
            line-height: 1;
        }

        .theme-select-button:focus-visible,
        .theme-select-list:focus-visible {
            outline: 2px solid currentColor;
            outline-offset: 2px;
        }

        .theme-select-list {
            position: absolute;
            inset-block-start: calc(100% + 0.25rem);
            inset-inline-start: 0;
            z-index: 10;
            min-inline-size: 10rem;
            margin: 0;
            padding: 0.25rem 0;
            list-style: none;
            border: 1px solid currentColor;
            border-radius: 0.25rem;
            background: Canvas;
        }

        /* Any `display` rule above would beat the UA stylesheet's
           `[hidden] { display: none }`, so re-assert it here. */
        .theme-select-list[hidden] {
            display: none;
        }

        .theme-select-option {
            padding: 0.35rem 0.75rem;
            cursor: pointer;
        }

        /* The keyboard-highlighted option: where Enter would land.
           Focus stays on the <ul>, so :focus never matches an <li>. */
        .theme-select-option[data-active] {
            background: Highlight;
            color: HighlightText;
        }

        /* The chosen option: a deliberately different signal, since
           the two frequently disagree while the list is open. */
        .theme-select-option[aria-selected="true"]::after {
            content: " ✓";
        }
    </style>
</head>
<body>
    <h1>Theme select — basic</h1>

    <theme-select
        label="Theme"
        themes-url="/assets/themes/"
        themes="light,dark,abyss"
    ></theme-select>

    <p class="theme-select-status" aria-live="polite">Active theme: Light</p>

    <script type="module">
        await customElements.whenDefined("theme-select");

        const select = document.querySelector("theme-select");
        const status = document.querySelector(".theme-select-status");

        // labelFor() is a public method on the element, so any
        // theme-labels overrides and translations are picked up for
        // free and the status line never shows a raw slug.
        select.addEventListener("themechange", (e) => {
            status.textContent = `Active theme: ${select.labelFor(e.detail.theme)}`;
        });
    </script>
</body>
</html>
