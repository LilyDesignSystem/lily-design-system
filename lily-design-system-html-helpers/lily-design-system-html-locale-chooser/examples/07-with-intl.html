<!doctype html>
<!--
    Example 7 — Native Intl.* formatters.

    For apps with no formal i18n library, the built-in Intl.*
    APIs cover dates, numbers, currencies, relative time, list
    formatting, and plural rules. Every formatter takes a locale
    string identical to what the select emits.

    The localechange listener rebuilds the formatters with the new
    locale and re-renders the affected DOM. Intl.* accepts both
    "en-US" and "en_US" — the select normalises to hyphens for the
    document <html lang> but the bindable value round-trips
    whichever form the consumer wrote into locales=.

    Note: locale-chooser.ts may need compilation to .js — adjust the
    <script src=…> per your build output.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>locale-chooser — Intl</title>
    <script type="module" src="../../locale-chooser.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-inline-size: 50rem; }
        /* Required: the package ships no CSS, so the dropdown has no
           positioning of its own and would otherwise render in flow. */
        .locale-chooser { position: relative; display: inline-block; }
        .locale-chooser-button {
            font: inherit; line-height: 1; padding: 0.5rem;
            background: #ffffff; border: 1px solid #4c6272;
            border-radius: 4px; cursor: pointer;
        }
        .locale-chooser-button:focus-visible,
        .locale-chooser-list:focus-visible {
            outline: 3px solid #003087; outline-offset: 2px;
        }
        .locale-chooser-list {
            position: absolute; inset-inline-start: 0;
            inset-block-start: calc(100% + 0.25rem); z-index: 10;
            margin: 0; padding: 0.25rem 0; list-style: none;
            min-inline-size: 12rem; max-block-size: 16rem; overflow-y: auto;
            background: #ffffff; border: 1px solid #4c6272; border-radius: 4px;
        }
        /* The element toggles `hidden`; never override it away. */
        .locale-chooser-list[hidden] { display: none; }
        .locale-chooser-option { font: inherit; padding: 0.375rem 0.75rem; cursor: pointer; }
        /* Keyboard-highlighted vs applied — different things. */
        .locale-chooser-option[data-active] { background: #f0f4f5; }
        .locale-chooser-option[aria-selected="true"] { font-weight: 700; }
        .locale-chooser-option[aria-selected="true"]::after { content: " ✓"; }
        dl { display: grid; grid-template-columns: max-content 1fr; gap: 0.5rem 1.5rem; }
        dt { font-weight: 600; }
        dd { margin: 0; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>
    <h1>Locale chooser — Intl.* formatters</h1>

    <locale-chooser
        id="select"
        label="Locale"
        locales="en,en-US,en-GB,fr,fr-CA,de,de-AT,ar,ja,zh-Hans"
        storage-key="intl-demo-locale"
    ></locale-chooser>

    <dl>
        <dt>Date (long):</dt>
        <dd id="date">—</dd>

        <dt>Date (relative):</dt>
        <dd id="relative">—</dd>

        <dt>Number (large):</dt>
        <dd id="number">—</dd>

        <dt>Currency (GBP):</dt>
        <dd id="currency-gbp">—</dd>

        <dt>Currency (JPY):</dt>
        <dd id="currency-jpy">—</dd>

        <dt>List:</dt>
        <dd id="list">—</dd>

        <dt>Plural rule (3):</dt>
        <dd id="plural">—</dd>
    </dl>

    <script type="module">
        await customElements.whenDefined("locale-chooser");
        const select = document.querySelector("#select");

        function refresh() {
            const locale = select.value || "en";

            const date = new Date();
            const yesterday = new Date(Date.now() - 24 * 3600 * 1000);

            document.querySelector("#date").textContent =
                new Intl.DateTimeFormat(locale, { dateStyle: "long" }).format(date);

            document.querySelector("#relative").textContent =
                new Intl.RelativeTimeFormat(locale, { numeric: "auto" })
                    .format(-1, "day");

            document.querySelector("#number").textContent =
                new Intl.NumberFormat(locale).format(67_330_000);

            document.querySelector("#currency-gbp").textContent =
                new Intl.NumberFormat(locale, {
                    style: "currency",
                    currency: "GBP",
                }).format(1234.56);

            document.querySelector("#currency-jpy").textContent =
                new Intl.NumberFormat(locale, {
                    style: "currency",
                    currency: "JPY",
                }).format(98765);

            document.querySelector("#list").textContent =
                new Intl.ListFormat(locale, { type: "conjunction" })
                    .format(["apple", "orange", "banana"]);

            document.querySelector("#plural").textContent =
                new Intl.PluralRules(locale).select(3);
        }

        select.addEventListener("localechange", refresh);
        refresh();
    </script>
</body>
</html>
