<!doctype html>
<!--
    Example 6 — FormatJS IntlMessageFormat from CDN.

    FormatJS ships the standards-compliant ICU MessageFormat
    compiler. It handles plurals, gender, ordinals, and embedded
    number / date formatters in a single library.

    Loading via esm.sh keeps this example self-contained (no
    npm install). The select fires localechange; the listener
    recompiles the message format with the new locale and
    re-renders the affected DOM nodes.

    Note: locale-chooser.ts may need compilation to .js — adjust the
    <script src=…> per your build output.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>locale-chooser — FormatJS</title>
    <script type="module" src="../../locale-chooser.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; max-inline-size: 40rem; }
        /* Required: the package ships no CSS, so the dropdown has no
           positioning of its own and would otherwise render in flow. */
        .locale-chooser { position: relative; display: inline-block; }
        .locale-chooser-button {
            font: inherit; line-height: 1; padding: 0.5rem;
            background: #ffffff; border: 1px solid #4c6272;
            border-radius: 4px; cursor: pointer;
        }
        .locale-chooser-button:focus-visible,
        .locale-chooser-list:focus-visible {
            outline: 3px solid #003087; outline-offset: 2px;
        }
        .locale-chooser-list {
            position: absolute; inset-inline-start: 0;
            inset-block-start: calc(100% + 0.25rem); z-index: 10;
            margin: 0; padding: 0.25rem 0; list-style: none;
            min-inline-size: 12rem; max-block-size: 16rem; overflow-y: auto;
            background: #ffffff; border: 1px solid #4c6272; border-radius: 4px;
        }
        /* The element toggles `hidden`; never override it away. */
        .locale-chooser-list[hidden] { display: none; }
        .locale-chooser-option { font: inherit; padding: 0.375rem 0.75rem; cursor: pointer; }
        /* Keyboard-highlighted vs applied — different things. */
        .locale-chooser-option[data-active] { background: #f0f4f5; }
        .locale-chooser-option[aria-selected="true"] { font-weight: 700; }
        .locale-chooser-option[aria-selected="true"]::after { content: " ✓"; }
        .row { display: flex; align-items: center; gap: 1rem; margin-block: 1rem; }
        input[type="number"] {
            font: inherit; padding: 0.25rem 0.5rem;
            border: 1px solid #4c6272; border-radius: 4px; inline-size: 6rem;
        }
    </style>
</head>
<body>
    <h1>Locale chooser — FormatJS messages</h1>

    <locale-chooser
        id="select"
        label="Language"
        locales="en,fr,ar"
    ></locale-chooser>

    <div class="row">
        <label for="count">Unread:</label>
        <input id="count" type="number" min="0" value="3">
    </div>

    <p id="greeting">…</p>

    <script type="module">
        const IntlMessageFormat = (
            await import("https://esm.sh/intl-messageformat@10")
        ).default;
        await customElements.whenDefined("locale-chooser");

        const messages = {
            en: "Hello, {name}! You have {count, plural, one {# unread message} other {# unread messages}}.",
            fr: "Bonjour {name} ! Vous avez {count, plural, one {# message non lu} other {# messages non lus}}.",
            ar: "مرحبا {name}! لديك {count, plural, zero {لا توجد رسائل} one {# رسالة غير مقروءة} two {رسالتان غير مقروءتين} few {# رسائل غير مقروءة} many {# رسالة غير مقروءة} other {# رسالة غير مقروءة}}.",
        };

        const select = document.querySelector("#select");
        const out = document.querySelector("#greeting");
        const countInput = document.querySelector("#count");

        function render() {
            const locale = select.value || "en";
            const tmpl = messages[locale] ?? messages.en;
            const fmt = new IntlMessageFormat(tmpl, locale);
            out.lang = locale.replace(/_/g, "-");
            out.textContent = fmt.format({
                name: "Alex",
                count: Number(countInput.value) || 0,
            });
        }

        select.addEventListener("localechange", render);
        countInput.addEventListener("input", render);
        render();
    </script>
</body>
</html>
