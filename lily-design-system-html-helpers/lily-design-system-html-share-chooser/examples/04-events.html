<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>share-chooser — events and callbacks</title>
<style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 40rem; }
      share-chooser { display: inline-block; }
      .share-chooser { position: relative; display: inline-block; }
      .share-chooser-button {
        font: inherit; cursor: pointer; padding: 0.4rem 0.6rem;
        background: none; border: 1px solid currentColor; border-radius: 0.25rem;
      }
      .share-chooser-icon { font-size: 1.15em; line-height: 1; }
      .share-chooser-list {
        position: absolute; inset-block-start: 100%; inset-inline-start: 0; z-index: 10;
        margin: 0.25rem 0 0; padding: 0.25rem 0; list-style: none; min-inline-size: max-content;
        background: #fff; border: 1px solid #d8dde0; border-radius: 0.25rem;
        box-shadow: 0 2px 8px rgb(0 0 0 / 0.12);
      }
      /* Required: the rule above would otherwise defeat [hidden]. */
      .share-chooser-list[hidden] { display: none; }
      .share-chooser-target, .share-chooser-copy {
        display: block; inline-size: 100%; padding: 0.5rem 0.75rem;
        font: inherit; color: inherit; text-align: start; text-decoration: none;
        background: none; border: 0; cursor: pointer;
      }
      .share-chooser-target:hover, .share-chooser-copy:hover { background: #f0f4f5; }
      :focus-visible { outline: 3px solid #ffeb3b; outline-offset: 2px; }
      .share-chooser-status { margin: 0.5rem 0 0; font-size: 0.875rem; color: #4c6272; }
    </style>
  </head>
  <body>
    <h1>share-chooser — events and callbacks</h1>
    <p>
      Every callback has a matching bubbling <code>CustomEvent</code>. Use the
      events for page-level wiring, the callbacks when you already hold an
      element reference. Both fire, callback first.
    </p>

    <share-chooser id="share" label="Share this page" copy-label="Copy link"
                  copied-label="Copied" copy-failed-label="Could not copy"></share-chooser>

    <h2>Log</h2>
    <ul id="log"></ul>

    <script type="module">
      import "/dist/share-chooser.js";

      const el = document.getElementById("share");
      const log = document.getElementById("log");
      const line = (msg) => {
        const li = document.createElement("li");
        li.textContent = msg;
        log.appendChild(li);
      };

      el.targets = [
        { id: "mastodon", label: "Mastodon",
          href: (url) => `https://mastodon.social/share?text=${encodeURIComponent(url)}` },
      ];

      // Callbacks (property-only).
      el.onShare = (id, url) => line(`callback onShare: ${id} — ${url}`);
      el.onCopy = (url) => line(`callback onCopy: ${url}`);
      el.onNativeShare = (url) => line(`callback onNativeShare: ${url}`);

      // Events — these bubble, so document-level listeners work.
      document.addEventListener("share", (e) =>
        line(`event share: ${JSON.stringify(e.detail)}`));
      document.addEventListener("copy", (e) => {
        if (e instanceof CustomEvent && e.detail?.url) line(`event copy: ${e.detail.url}`);
      });
      document.addEventListener("nativeshare", (e) =>
        line(`event nativeshare: ${JSON.stringify(e.detail)}`));

      // A dismissed native sheet fires nothing — it is neither success nor error.
    </script>
  </body>
</html>
