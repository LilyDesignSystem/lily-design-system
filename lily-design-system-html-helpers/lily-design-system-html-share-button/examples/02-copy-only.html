<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>share-button — copy only</title>
<style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 40rem; }
      share-button { display: inline-block; }
      .share-button { position: relative; display: inline-block; }
      .share-button-trigger {
        font: inherit; cursor: pointer; padding: 0.4rem 0.6rem;
        background: none; border: 1px solid currentColor; border-radius: 0.25rem;
      }
      .share-button-icon { font-size: 1.15em; line-height: 1; }
      .share-button-list {
        position: absolute; inset-block-start: 100%; inset-inline-start: 0; z-index: 10;
        margin: 0.25rem 0 0; padding: 0.25rem 0; list-style: none; min-inline-size: max-content;
        background: #fff; border: 1px solid #d8dde0; border-radius: 0.25rem;
        box-shadow: 0 2px 8px rgb(0 0 0 / 0.12);
      }
      /* Required: the rule above would otherwise defeat [hidden]. */
      .share-button-list[hidden] { display: none; }
      .share-button-target, .share-button-copy {
        display: block; inline-size: 100%; padding: 0.5rem 0.75rem;
        font: inherit; color: inherit; text-align: start; text-decoration: none;
        background: none; border: 0; cursor: pointer;
      }
      .share-button-target:hover, .share-button-copy:hover { background: #f0f4f5; }
      :focus-visible { outline: 3px solid #ffeb3b; outline-offset: 2px; }
      .share-button-status { margin: 0.5rem 0 0; font-size: 0.875rem; color: #4c6272; }
    </style>
  </head>
  <body>
    <h1>share-button — copy only</h1>
    <p>
      No destinations at all: with only <code>copy-label</code> set, the
      control is a one-item “copy this page’s link” disclosure. Nothing is
      persisted and nothing is applied to the document.
    </p>

    <share-button
      label="Copy a link to this page"
      copy-label="Copy link"
      copied-label="Link copied to clipboard"
      copy-failed-label="Could not copy — select the address bar and press Ctrl+C"
    ></share-button>

    <script type="module">
      import "/dist/share-button.js";
    </script>
  </body>
</html>
