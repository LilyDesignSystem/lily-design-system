<!doctype html>
<!--
    Example 8 — All 45 Lily themes.

    This is the full catalog shipped in `../../themes/`: the DaisyUI
    -derived general-purpose themes, the six NHS England / Scotland /
    Wales patient + practitioner variants, and four public-sector and
    vendor reference themes (GOV.UK GDS, USWDS, Adobe Spectrum,
    Mozilla Protocol). Drop them all into `public/assets/themes/` and
    the select will swap between them. "light" remains the default
    because it is in the list.

    The `themes` attribute is a CSV. For long lists it's easier to
    set the JS property — the select re-renders automatically.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>theme-chooser — Lily themes</title>
    <script type="module" src="/dist/theme-chooser.js"></script>
</head>
<body>
    <h1>Theme chooser — Lily themes</h1>

    <theme-chooser
        id="theme-chooser"
        label="Lily theme"
        themes-url="/assets/themes/"
        themes="light"
        storage-key="lily:theme"
    ></theme-chooser>

    <script type="module">
        await customElements.whenDefined("theme-chooser");

        document.querySelector("#theme-chooser").themes = [
            "abyss", "acid", "aqua", "autumn", "black", "bumblebee",
            "business", "caramellatte", "cmyk", "coffee", "corporate",
            "cupcake", "cyberpunk", "dark", "dim", "dracula", "emerald",
            "fantasy", "forest", "garden", "halloween", "lemonade",
            "light", "lofi", "luxury", "night", "nord", "pastel",
            "retro", "silk", "sunset", "synthwave", "valentine",
            "winter", "wireframe",
            "united-kingdom-national-health-service-england-for-patients",
            "united-kingdom-national-health-service-england-for-practitioners",
            "united-kingdom-national-health-service-scotland-for-patients",
            "united-kingdom-national-health-service-scotland-for-practitioners",
            "united-kingdom-national-health-service-wales-for-patients",
            "united-kingdom-national-health-service-wales-for-practitioners",
            "united-kingdom-government-digital-service",
            "united-states-web-design-system",
            "adobe-spectrum",
            "mozilla-protocol",
        ];
    </script>
</body>
</html>
