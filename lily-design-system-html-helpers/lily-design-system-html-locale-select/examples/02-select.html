<!doctype html>
<!--
    Example 2 — Styling the native <select>.

    The default rendering is already a native <select> with one
    <option> per locale, which is compact for long locale lists
    (10+) and pops the OS-native picker on mobile. This example
    just supplies CSS that targets the `locale-select` class hook
    and the per-option `locale-select-option` hook — no subclass
    needed.

    Note: consumers may need to compile locale-select.ts to .js
    before loading. The path "../../locale-select.js" is
    illustrative; adjust to your build output.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>locale-select — styled select</title>
    <script type="module" src="../../locale-select.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; }
        .locale-select {
            font: inherit;
            padding: 0.5rem 0.75rem;
            border: 1px solid #4c6272;
            border-radius: 4px;
        }
        .locale-select-option { font: inherit; }
    </style>
</head>
<body>
    <h1>Locale select — styled native &lt;select&gt;</h1>

    <locale-select
        id="select"
        label="Language"
        locales="en,en-US,en-GB,fr,fr-CA,de,de-AT,de-CH,es,es-MX,it,nl,pl,pt,pt-BR,ja,zh-Hans,zh-Hant,ko,ar,he"
        storage-key="select-demo-locale"
    ></locale-select>

    <p>Selected: <code id="out">—</code></p>

    <script type="module">
        await customElements.whenDefined("locale-select");
        document
            .querySelector("#select")
            .addEventListener("localechange", (e) => {
                document.querySelector("#out").textContent = e.detail.locale;
            });
    </script>
</body>
</html>
