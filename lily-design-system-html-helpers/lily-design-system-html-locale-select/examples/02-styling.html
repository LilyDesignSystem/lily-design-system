<!doctype html>
<!--
    Example 2 — Styling the default rendering. No subclass needed.

    Everything visual about this control is CSS on the five class
    hooks the element emits:

      .locale-select          the <div> root
      .locale-select-button   the trigger <button>
      .locale-select-icon     the glyph <span> (aria-hidden)
      .locale-select-list     the <ul role="listbox">
      .locale-select-option   each <li role="option">

    plus two state selectors that mean DIFFERENT THINGS:

      [data-active]           the keyboard-highlighted option; follows
                              the arrow keys; gone when the list closes
      [aria-selected="true"]  the applied locale; survives closing

    Conflating those two is the most common styling mistake. Give
    each its own signal, and don't rely on colour alone (WCAG 1.4.1):
    here, active gets a background, selected gets a checkmark and
    bold weight.

    POSITIONING IS MANDATORY, NOT OPTIONAL. The package ships no CSS
    whatsoever, so the <ul> starts life in normal flow. `position:
    relative` on the root plus `position: absolute` on the list is
    the minimum that makes this a dropdown rather than a block that
    shoves the page around.

    Use logical properties (inset-inline-start, not left) so the
    dropdown flips when the user picks an RTL locale — try Arabic or
    Hebrew below and watch it move to the other side.

    This example ships a long locale list on purpose: it exercises
    max-block-size + overflow-y on the list, and the typeahead
    (open the list and type "fr" or "ja").

    Note: consumers may need to compile locale-select.ts to .js
    before loading. The path "../../locale-select.js" is
    illustrative; adjust to your build output.
-->
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>locale-select — styling the default rendering</title>
    <script type="module" src="../../locale-select.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; padding: 2rem; }

        /* ---- Required: positioning ---- */
        .locale-select {
            position: relative;
            display: inline-block;
        }

        /* ---- The trigger ---- */
        .locale-select-button {
            font: inherit;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 0.75rem;
            background: #ffffff;
            border: 1px solid #4c6272;
            border-radius: 4px;
            cursor: pointer;
        }
        .locale-select-button:hover { background: #f0f4f5; }

        /* The element keeps aria-expanded in sync — style from it
           rather than trying to observe the open state in JS. */
        .locale-select-button[aria-expanded="true"] {
            border-color: #005eb8;
            box-shadow: inset 0 0 0 1px #005eb8;
        }

        .locale-select-icon { font-size: 1.125rem; }

        /* ---- Visible focus on both focusable elements ---- */
        .locale-select-button:focus-visible,
        .locale-select-list:focus-visible {
            outline: 3px solid #003087;
            outline-offset: 2px;
        }

        /* ---- The dropdown ---- */
        .locale-select-list {
            position: absolute;
            inset-inline-start: 0;
            inset-block-start: calc(100% + 0.25rem);
            z-index: 10;
            margin: 0;
            padding: 0.25rem 0;
            list-style: none;
            min-inline-size: 14rem;
            max-block-size: 18rem;
            overflow-y: auto;
            background: #ffffff;
            border: 1px solid #4c6272;
            border-radius: 4px;
            box-shadow: 0 4px 12px rgb(0 0 0 / 0.15);
        }
        /* The element toggles the `hidden` attribute. Any rule that
           sets `display` on the list would defeat it, so guard it. */
        .locale-select-list[hidden] { display: none; }

        /* ---- The options ---- */
        .locale-select-option {
            padding: 0.375rem 0.75rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }
        .locale-select-option:hover { background: #f0f4f5; }

        /* Keyboard-highlighted. */
        .locale-select-option[data-active] {
            background: #d8e8f5;
            box-shadow: inset 3px 0 0 #005eb8;
        }

        /* Applied. Weight + glyph, so it is not colour-only. */
        .locale-select-option[aria-selected="true"] { font-weight: 700; }
        .locale-select-option[aria-selected="true"]::after {
            content: "✓";
            color: #005eb8;
        }
    </style>
</head>
<body>
    <h1>Locale select — styled default rendering</h1>

    <p>
        Open the list and arrow through it: the highlighted row is
        <code>[data-active]</code>, the checked row is
        <code>[aria-selected="true"]</code>. Pick Arabic or Hebrew and
        the dropdown flips to the other side, because it is positioned
        with <code>inset-inline-start</code>.
    </p>

    <locale-select
        id="select"
        label="Language"
        locales="en,en-US,en-GB,fr,fr-CA,de,de-AT,de-CH,es,es-MX,it,nl,pl,pt,pt-BR,ja,zh-Hans,zh-Hant,ko,ar,he"
        storage-key="styling-demo-locale"
    ></locale-select>

    <p>Selected: <code id="out">—</code></p>

    <script type="module">
        await customElements.whenDefined("locale-select");
        document
            .querySelector("#select")
            .addEventListener("localechange", (e) => {
                document.querySelector("#out").textContent = e.detail.locale;
            });
    </script>
</body>
</html>
